<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>EduIntellect Parent</title>
    <meta name="description" content="Track your child's academic progress, attendance, assignments and more." />
    <meta name="author" content="EduIntellect" />
    <meta name="keywords" content="school, parent, education, student, attendance, grades" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0B1F3A" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduIntellect" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" href="/favicon.ico" />

    <!-- OG / Social -->
    <meta property="og:title" content="EduIntellect Parent" />
    <meta property="og:description" content="Track your child's academic progress in real time." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="EduIntellect Parent" />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0B1F3A" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- PDF.js (existing) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
      window.pdfjsLib = window['pdfjs-dist/build/pdf'];
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
